<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Recite GRE 是一个带 AI 补全、词书学习、Anki 复习和云同步的英语单词学习工具。">
  <meta name="theme-color" content="#4A7DFF">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recite GRE">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Recite GRE</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      background: #f6f8fa;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
    }

    flt-glass-pane,
    flutter-view {
      height: 100%;
      overscroll-behavior: none;
      width: 100%;
    }

    #app-loader {
      align-items: center;
      background: #f6f8fa;
      color: #172026;
      display: flex;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 9999;
    }

    .loader-card {
      align-items: center;
      display: flex;
      gap: 14px;
    }

    .loader-mark {
      align-items: center;
      background: #4a7dff;
      border-radius: 10px;
      color: white;
      display: flex;
      font-size: 22px;
      font-weight: 800;
      height: 44px;
      justify-content: center;
      width: 44px;
    }

    .loader-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      margin: 0 0 4px;
    }

    .loader-subtitle {
      color: #60747f;
      font-size: 13px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Recite GRE loading">
    <div class="loader-card">
      <div class="loader-mark">?</div>
      <div>
        <p class="loader-title">Recite GRE</p>
        <p class="loader-subtitle">正在打开学习空间</p>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('app-loader');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
